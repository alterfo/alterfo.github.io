<?xml version="1.0" encoding="UTF-8"?>
<!-- Open Graph social card source — 1200×630.
     Aesthetic mirrors theme/Portfolio.vue hero: холодный графит void (#14161a),
     serif name, roles line, treble-clef + staff motif, jewel-tone spectrum
     particle dots. No glow (removed 2026-07-12 site-wide — reads as generic
     "gamer/crypto hero" rather than elite). Rasterize to public/og.png. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Холодный графит radial glow over the void base -->
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%"  stop-color="#1c1f24"/>
      <stop offset="55%" stop-color="#181a1e"/>
      <stop offset="100%" stop-color="#14161a"/>
    </radialGradient>
    <!-- Spectrum accent bar = 6 «сферы круга жизни» jewel-tone colors -->
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7a3348"/>
      <stop offset="20%"  stop-color="#a8874a"/>
      <stop offset="40%"  stop-color="#3f5946"/>
      <stop offset="60%"  stop-color="#8a5568"/>
      <stop offset="80%"  stop-color="#4a6178"/>
      <stop offset="100%" stop-color="#6b5a48"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#14161a"/>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ── Connecting-particle dots (subtle, spectrum-tinted) ───────── -->
  <g opacity="0.9">
    <line x1="150" y1="120" x2="300" y2="180" stroke="rgba(230,228,224,0.10)" stroke-width="1"/>
    <line x1="300" y1="180" x2="240" y2="300" stroke="rgba(230,228,224,0.08)" stroke-width="1"/>
    <line x1="980" y1="150" x2="1080" y2="240" stroke="rgba(230,228,224,0.09)" stroke-width="1"/>
    <line x1="1080" y1="240" x2="940" y2="320" stroke="rgba(230,228,224,0.07)" stroke-width="1"/>
    <circle cx="150"  cy="120" r="4" fill="#7a3348" opacity="0.55"/>
    <circle cx="300"  cy="180" r="3" fill="#a8874a" opacity="0.5"/>
    <circle cx="240"  cy="300" r="3" fill="#3f5946" opacity="0.45"/>
    <circle cx="980"  cy="150" r="3" fill="#8a5568" opacity="0.5"/>
    <circle cx="1080" cy="240" r="4" fill="#4a6178" opacity="0.5"/>
    <circle cx="940"  cy="320" r="3" fill="#6b5a48" opacity="0.45"/>
    <circle cx="1040" cy="90"  r="2" fill="#a8874a" opacity="0.4"/>
    <circle cx="110"  cy="430" r="2" fill="#8a5568" opacity="0.4"/>
  </g>

  <!-- ── Name + roles ─────────────────────────────────────────────── -->
  <text x="600" y="278" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="104" font-weight="700"
        fill="#f7f6f3">Oleg Sidorkin</text>

  <text x="600" y="344" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', sans-serif" font-size="30"
        letter-spacing="10" fill="rgba(230,228,224,0.62)">ENGINEER · MUSICIAN · BUILDER</text>

  <!-- spectrum accent bar under the name -->
  <rect x="470" y="372" width="260" height="4" rx="2" fill="url(#spectrum)" opacity="0.92"/>

  <!-- ── Staff + treble clef motif (lower third) ──────────────────── -->
  <g transform="translate(0,470)">
    <line x1="120" y1="0"  x2="1080" y2="0"  stroke="rgba(230,228,224,0.12)" stroke-width="1.5"/>
    <line x1="120" y1="16" x2="1080" y2="16" stroke="rgba(230,228,224,0.12)" stroke-width="1.5"/>
    <line x1="120" y1="32" x2="1080" y2="32" stroke="rgba(230,228,224,0.12)" stroke-width="1.5"/>
    <line x1="120" y1="48" x2="1080" y2="48" stroke="rgba(230,228,224,0.12)" stroke-width="1.5"/>
    <line x1="120" y1="64" x2="1080" y2="64" stroke="rgba(230,228,224,0.12)" stroke-width="1.5"/>
    <text x="150" y="62" font-family="'Times New Roman', Georgia, serif" font-size="118"
          fill="rgba(122,51,72,0.55)">&#x1D11E;</text>
    <!-- notes on the staff in spectrum colors -->
    <circle cx="430" cy="48" r="8" fill="#3f5946" opacity="0.7"/>
    <circle cx="560" cy="16" r="8" fill="#a8874a" opacity="0.7"/>
    <circle cx="690" cy="32" r="8" fill="#8a5568" opacity="0.7"/>
    <circle cx="820" cy="0"  r="8" fill="#4a6178" opacity="0.7"/>
    <circle cx="950" cy="24" r="8" fill="#7a3348" opacity="0.7"/>
  </g>

  <!-- ── Domain wordmark ──────────────────────────────────────────── -->
  <text x="600" y="600" text-anchor="middle"
        font-family="'SF Mono', 'Fira Code', ui-monospace, monospace" font-size="22"
        letter-spacing="3" fill="rgba(230,228,224,0.40)">alterfo.github.io</text>
</svg>
